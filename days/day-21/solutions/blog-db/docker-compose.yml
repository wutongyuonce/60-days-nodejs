services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-blog
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-blog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog} -d ${POSTGRES_DB:-blog}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pg-blog-data:
    name: pg-blog-data
